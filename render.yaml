services:
  - type: web
    name: OFIS_Projet
    runtime: python
    rootDir: ofis-backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ofis-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
    preDeployCommand: python manage.py migrate